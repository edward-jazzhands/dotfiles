---Takes a chip name string (e.g. "k10temp") and returns the hwmon index number
---that corresponds to it on the current system (e.g. "3"), or "0" if not found.
---@param name string
---@return string
local function get_hwmon(name)

    -- One of the `name` files has the name we are looking for inside.
    -- Grep -r means recursive, -l means only print the file name/path
    -- head -1 takes only the first match in case there are multiple.
    local handle = io.popen("grep -rl '" .. name .. "' /sys/class/hwmon/*/name 2>/dev/null | head -1")

    -- "*l" means "read a line" (this is standard Lua io mode).
    local result = handle:read("*l")
    handle:close()

    -- Always close the handle after reading in Lua, otherwise you get leaks.

    if result then
        -- result will be a path like /sys/class/hwmon/hwmon3/name
        -- :match("hwmon(%d+)") runs a pattern capture on that string.
        -- %d+ matches one or more digits, the parens capture just that part,
        -- so this returns "3" from the example path above.
        return result:match("hwmon(%d+)")
    end
    return "0"  -- fallback
end

-- We must get the name of the computer this is running on.
local handle = io.popen("hostname")
local hostname = handle:read("*l")
handle:close()

-- Here you must enter in the names of the chips for each computer
-- you are running this on.
-- Run this command to find the names of your hwmon chips:
-- cat /sys/class/hwmon/hwmon*/name
-- To find which hwmon uses which number:
-- ls -la /sys/class/hwmon

if hostname == "brent-UX21E" then

    local temp_id = get_hwmon("coretemp")   -- name of your temp chip
    local fan_id = get_hwmon("asus")       -- your fan controller chip

    conky.text = [[
    CPU:    ${cpu cpu0}%  ${cpubar cpu0 8,50}
    Temp:   ${hwmon ]] .. temp_id .. [[ temp 1}°C
    Fan:    ${hwmon ]] .. fan_id .. [[ fan 1} RPM
    RAM:    ${memperc}%  ${membar 8,50}
    Script: ${execi 1 bash ~/scripts/server-stats.sh}
    ]]
elseif hostname == "brent-other-computer" then

    local temp_id = get_hwmon("coretemp")   -- name of your temp chip
    local fan_id = get_hwmon("asus")       -- your fan controller chip

    conky.text = [[
    CPU:    ${cpu cpu0}%  ${cpubar cpu0 8,50}
    Temp:   ${hwmon ]] .. temp_id .. [[ temp 1}°C
    Fan:    ${hwmon ]] .. fan_id .. [[ fan 1} RPM
    RAM:    ${memperc}%  ${membar 8,50}
    ]]
else
    -- Unregistered computer name - drop everything except CPU+RAM
    conky.text = [[
    CPU:    ${cpu cpu0}%  ${cpubar cpu0 8,50}
    RAM:    ${memperc}%  ${membar 8,50}
    ]]
    
end

