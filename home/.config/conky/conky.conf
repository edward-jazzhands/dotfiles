conky.config = {
    -- Window behavior
    own_window = true,
    own_window_type = 'normal',
    own_window_hints = 'above,undecorated,skip_taskbar,skip_pager',

    -- Transparency
    own_window_argb_visual = true,
    own_window_argb_value = 120,
    own_window_colour = '000000',

    -- Position (top-right corner, adjust to taste)
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 20,

    -- Size
    minimum_width = 170,
    maximum_width = 170,

    -- No border/background decorations
    draw_borders = false,
    draw_graph_borders = false,
    border_width = 0,

    -- Text
    use_xft = true,
    font = 'monospace:size=10',
    default_color = 'white',

    -- Behavior
    update_interval = 1.0,
    double_buffer = true,
    no_buffers = true,
}

conky.text = [[
CPU:    ${cpu cpu0}%  ${cpubar cpu0 8,50}
Temp:   ${hwmon 4 temp 1}°C
Fan:    ${hwmon 2 fan 1} RPM
RAM:    ${memperc}%  ${membar 8,50}
Script: ${execi 1 bash ~/scripts/server-stats.sh}
]]

-- remember: cat /sys/class/hwmon/hwmon*/name
-- to find which hwmon uses which number. It maps in order alphabetically.
